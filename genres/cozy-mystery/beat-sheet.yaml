# Cozy-mystery dramatic shape — consumed by tension_check.py (off-mark-beat,
# starved-thread, dead-stretch) and read by plot-proposer at the spine stage.
# Fractions are of total_chapters, computed — never hand-numbered.
beats:
  - { id: inciting-death,    by_fraction: 0.15 }
  - { id: midpoint-reversal, at_fraction: 0.50, tolerance: 0.08 }
  - { id: dark-night,        window: [0.70, 0.85] }
  - { id: reveal,            from: whodunit }
tracks:
  max_dark_gap: { M: 2, P: 4, R: 4, B: 5 }
questions:
  min_open_before_reveal: 1
# Consumed by tension_check.py's overloaded-chapter. Post packet/map redesign (spec
# 2026-07-18), a chapter's OBLIGATION LOAD is counted at LOCK time straight off the
# packet-format outline block: Required Beats (one line each, counted as written —
# ORDER IS CONTRACT) + clues planted + questions opened/closed + tracks advanced. Beats
# are now part of the count, where the old (pre-redesign) basis counted only what a
# chapter owed BESIDES its scenes and assumed those obligations were discharged inside
# the anchor scene in a sentence. That assumption is gone along with the anchor scene
# itself, so this cap needs SHOWRUNNER RETUNING for the beats-inclusive basis: the spec's
# own canonical example (book one's real chapter 5 — ten Required Beats, one clue plant,
# one question opened, one closed, two tracks advanced) carries a load of 15, well past
# the number below. Retune before relying on this check against a beats-inclusive count.
obligations:
  max_per_chapter: 8
