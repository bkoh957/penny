# Cozy-mystery dramatic shape — consumed by tension_check.py (off-mark-beat,
# starved-thread, dead-stretch) and read by plot-proposer at the spine stage.
# Fractions are of total_chapters, computed — never hand-numbered.
beats:
  - { id: inciting-death,    by_fraction: 0.15 }
  - { id: midpoint-reversal, at_fraction: 0.50, tolerance: 0.08 }
  - { id: dark-night,        window: [0.70, 0.85] }
  - { id: reveal,            from: whodunit }
tracks:
  max_dark_gap: { M: 2, P: 4, R: 4, B: 5 }
questions:
  min_open_before_reveal: 1
# Consumed by tension_check.py's overloaded-chapter. A chapter's OBLIGATION LOAD is what
# its word band must pay for besides its scenes: clues planted + questions opened + closed
# + tracks advanced. Most obligations are discharged inside the anchor scene in a sentence;
# past this many they stop being sentences and start being stops, and the chapter runs long
# no matter how well it is written. A cozy chapter carrying 1–2 clues, a question or two and
# two or three tracks sits comfortably under eight; the spec's failure case (three questions
# opened, two closed, two clues, four tracks = eleven) does not.
obligations:
  max_per_chapter: 8
