central_deception: |
  Mary Burrell has believed for a decade that her father was murdered. A discovery
  finally named Dr Neil Hartigan as the hand behind his death. She killed him
  believing she was avenging a crime — but Neil eased her father's passing at the
  old man's own repeated, desperate plea. She is right that his death was no
  accident, and catastrophically wrong about what it meant. Neil's compassion is
  the thing that kills him.
